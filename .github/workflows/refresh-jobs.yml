name: Refresh job market data

on:
  schedule:
    # Daily at 05:30 UTC (early morning Madrid time)
    - cron: "30 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Refresh market dataset
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          python -m job_hunter_agent refresh-market \
            --profile config/profile.nicolas.json \
            --market-config config/market_targets.madrid.json \
            --salary-bands config/salary_bands.example.json \
            --output-dir data/market \
            --merged-output data/market_jobs.json

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: daily market data refresh"
            git push
          fi
